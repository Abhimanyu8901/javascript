<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In - Blood Saathi</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1c1c1c; --red: #cc0000; --red2: #e00000;
      --white: #ffffff; --gray: #aaaaaa; --gray2: #d0d0d0;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Roboto', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* NAVBAR */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 60px; background: var(--bg);
      border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 999;
    }
    .logo img { 
      height: 90px; 
      width: auto; 
      max-width: 150px;
      display: block;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
    }
    .nav-links { display: flex; align-items: center; gap: 38px; list-style: none; }
    .nav-links a {
      color: var(--white); text-decoration: none; font-size: 15px;
      font-weight: 400; letter-spacing: .3px; transition: color .2s; position: relative;
    }
    .nav-links a:hover { color: var(--red); }
    .nav-links .active::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--red); border-radius: 2px;
    }
    .btn-login {
      background: var(--red); color: var(--white); padding: 11px 30px;
      border-radius: 6px; font-size: 15px; font-weight: 600; text-decoration: none;
      transition: background .2s, transform .15s; letter-spacing: .3px;
    }
    .btn-login:hover { background: var(--red2); transform: translateY(-1px); }

    /* LOGIN FORM */
    .login-container {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 60px 50px; max-width: 420px; width: 100%; box-shadow: 0 30px 80px rgba(0,0,0,0.3);
      animation: slideUp 0.8s ease both;
    }
    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .login-logo img {
      height: 60px; width: auto; max-width: 120px;
    }
    .login-title {
      font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .login-title .red { color: var(--red); }
    .login-desc {
      color: var(--gray2); text-align: center; font-family: 'Poppins', sans-serif;
      margin-bottom: 40px; font-size: 15px; line-height: 1.6;
    }
    .form-group {
      margin-bottom: 24px; display: flex; flex-direction: column;
    }
    .form-group label {
      font-weight: 500; margin-bottom: 8px; color: var(--white);
      font-size: 14px; letter-spacing: .3px;
    }
    .form-group input {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: var(--white); padding: 16px 20px; border-radius: 12px;
      font-family: inherit; font-size: 16px; transition: all .2s;
    }
    .form-group input:focus {
      outline: none; border-color: var(--red); box-shadow: 0 0 0 4px rgba(204,0,0,0.1);
      background: rgba(255,255,255,0.12);
    }
    .form-group input::placeholder { color: var(--gray); }
    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; font-size: 14px;
    }
    .remember {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: var(--gray2); user-select: none;
    }
    .checkbox {
      width: 18px; height: 18px; border: 1px solid var(--gray);
      border-radius: 4px; cursor: pointer; position: relative;
    }
    .checkbox:checked {
      background: var(--red); border-color: var(--red);
    }
    .checkbox:checked::after {
      content: '✓'; position: absolute; color: var(--white); font-size: 12px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .forgot { color: var(--red); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }
    .btn-submit {
      width: 100%; background: var(--red); color: var(--white); border: none;
      padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all .2s; font-family: 'Roboto', sans-serif;
      letter-spacing: .4px;
    }
    .btn-submit:hover { background: var(--red2); transform: translateY(-1px); box-shadow: 0 10px 30px rgba(204,0,0,0.3); }
    .signup-link {
      text-align: center; margin-top: 28px; color: var(--gray2);
      font-family: 'Poppins', sans-serif;
    }
    .signup-link a { color: var(--red); text-decoration: none; font-weight: 500; }
    .signup-link a:hover { text-decoration: underline; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      nav { padding: 16px 24px; }
      .login-card { padding: 40px 30px; margin: 20px; }
      .login-title { font-size: 28px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="./" class="logo">
    <img src="Blood_Saathi.png" alt="Blood Saathi Logo" />
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="#">Find Blood</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <a href="login.html" class="btn-login active">Log In</a>
</nav>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <img src="heart_logo.png" alt="Blood Saathi" />
    </div>
    <h1 class="login-title">
      Welcome Back <span class="red">साथी</span>
    </h1>
    <p class="login-desc">
      Log in to access your donor dashboard, manage requests, and save lives.
    </p>
    <form>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="form-options">
        <label class="remember">
          <span class="checkbox"></span>
          Remember me
        </label>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>
      <button type="submit" class="btn-submit">Log In</button>
    </form>
    <div class="signup-link">
      Don't have an account? <a href="#">Sign Up</a>
    </div>
  </div>
</div>

</body>
</html>
